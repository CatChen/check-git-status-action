name: 'Check Git Status'
description: 'Fail the workflow or git push based if git status is not clean.'
inputs:
  fail-if-not-clean:
    description: 'Fail the workflow if git status is not clean.'
    required: false
    default: true
  push-if-not-clean:
    description: 'Commit the changes and push them to the origin if git status is not clean.'
    required: false
    default: false
  request-changes-if-not-clean:
    description: 'Request change when in the context of a Pull Request if git status is not clean.'
    required: false
    default: true
  comment-if-not-clean:
    description: 'Comment when in the context of a Pull Request if git status is not clean.'
    required: false
    default: false
  github-token:
    description: 'GitHub token to use when pushing new changes.'
    required: false
    default: ${{ github.token }}
    deprecationMessage: 'Please use the push-token input instead.'
  push-token:
    description: 'GitHub token to use when pushing new changes.'
    required: false
    default: ${{ github.token }}
  request-changes-token:
    description: 'GitHub token to use when requesting changes in a Pull Request.'
    required: false
    default: ${{ github.token }}
  commit-message:
    description: 'The commit message to use when `push-if-not-clean` is `true` and there are changes.'
    required: false
    default: 'Changes detected by Check Git Status Action'
  push-strategy:
    description: 'Push strategy to use when pushing changes: `force-with-lease` (default), `force`, or `normal`.'
    required: false
    default: 'force-with-lease'
  request-changes-comment:
    description: 'The comment to use when `request-changes-if-not-clean` is `true` and there are changes.'
    required: false
    default: 'Changes detected by Check Git Status Action'
  comment-message:
    description: 'The comment to use when `comment-if-not-clean` is `true` and there are changes.'
    required: false
    default: 'Changes detected by Check Git Status Action'
  targets:
    description: 'Files, directories, and/or globs to check and commit. Use a newline-separated list for multiple targets.'
    required: false
    default: '.'
outputs:
  status:
    description: 'Is git status clean or dirty?'
    value: ${{ steps.git-status.outputs.status }}
  sha:
    description: 'Commit hash when push-if-not-clean is set to true and the status is dirty.'
    value: ${{ steps.git-commit.outputs.sha }}
runs:
  using: 'composite'
  steps:
    - id: sanitize-targets
      name: Sanitize targets
      shell: bash
      env:
        TARGETS_INPUT: ${{ inputs.targets }}
      run: |
        echo '::group::sanitize targets'
        TARGET_PATHS=()
        while IFS= read -r TARGET || [[ -n "$TARGET" ]]
        do
          TARGET="${TARGET#"${TARGET%%[![:space:]]*}"}"
          TARGET="${TARGET%"${TARGET##*[![:space:]]}"}"
          if [[ -n "$TARGET" ]]
          then
            TARGET_PATHS+=("$TARGET")
          fi
        done <<< "${TARGETS_INPUT//$'\r'/}"

        if [[ ${#TARGET_PATHS[@]} -eq 0 ]]
        then
          TARGET_PATHS=(".")
        fi

        for TARGET_PATH in "${TARGET_PATHS[@]}"
        do
          echo "::notice::Target: $TARGET_PATH"
        done

        {
          echo "targets<<EOF"
          printf '%s\n' "${TARGET_PATHS[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        echo '::endgroup::'

    - id: git-status
      name: git status
      shell: bash
      env:
        TARGETS: ${{ steps.sanitize-targets.outputs.targets }}
      run: |
        echo '::group::git status'
        if git rev-parse --verify HEAD >/dev/null 2>&1
        then
          against=HEAD
        else
          # Initial commit: diff against an empty tree object
          against=$(git hash-object -t tree /dev/null)
        fi

        TARGET_PATHS=()
        while IFS= read -r TARGET_PATH || [[ -n "$TARGET_PATH" ]]
        do
          TARGET_PATHS+=("$TARGET_PATH")
        done < <(printf '%s' "$TARGETS")

        git add -N -- "${TARGET_PATHS[@]}"
        CHANGED_FILES=()
        while IFS= read -r CHANGED_FILE || [[ -n "$CHANGED_FILE" ]]
        do
          CHANGED_FILES+=("$CHANGED_FILE")
        done < <(git diff --name-only "$against" -- "${TARGET_PATHS[@]}")
        if [[ ${#CHANGED_FILES[@]} -gt 0 ]]
        then
          echo "status=dirty" >> $GITHUB_OUTPUT
          echo "::notice::Git status is dirty"
          for CHANGED_FILE in "${CHANGED_FILES[@]}"
          do
            echo "::notice file=$CHANGED_FILE::  File: $CHANGED_FILE"
          done
        else
          echo "status=clean" >> $GITHUB_OUTPUT
          echo "::notice::Git status is clean"
        fi
        echo '::endgroup::'

    - id: get-tokens
      name: Get tokens
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' &&
          (inputs.request-changes-if-not-clean == 'true' || inputs.push-if-not-clean == 'true')
        }}
      shell: bash
      env:
        DEFAULT_TOKEN: ${{ github.token }}
        LEGACY_TOKEN: ${{ inputs.github-token }}
        REQUEST_CHANGES_TOKEN: ${{ inputs.request-changes-token }}
        PUSH_TOKEN: ${{ inputs.push-token }}
      run: |
        echo '::group::Get tokens'
        if [[ "$DEFAULT_TOKEN" = "$REQUEST_CHANGES_TOKEN" ]] && [[ "$DEFAULT_TOKEN" != "$LEGACY_TOKEN" ]]
        then
          # If github-token is assigned and request-changes-token is not assign (thus having the default token)
          # assign github-token to request-changes-token.
          echo "::warning::Using github-token as request-changes-token."
          echo "::warning::Please set request-changes-token and unset github-token."
          REQUEST_CHANGES_TOKEN="$LEGACY_TOKEN"
        fi
        echo "request-changes-token=$REQUEST_CHANGES_TOKEN" >> $GITHUB_OUTPUT

        if [[ "$DEFAULT_TOKEN" = "$PUSH_TOKEN" ]] && [[ "$DEFAULT_TOKEN" != "$LEGACY_TOKEN" ]]
        then
          # If github-token is assigned and push-token is not assign (thus having the default token)
          # assign github-token to push-token.
          echo "::warning::Using github-token as push-token."
          echo "::warning::Please set push-token and unset github-token."
          PUSH_TOKEN="$LEGACY_TOKEN"
        fi
        echo "push-token=$PUSH_TOKEN" >> $GITHUB_OUTPUT
        echo '::endgroup::'

    - id: get-pr-number
      name: Get PR number
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' &&
          (inputs.request-changes-if-not-clean == 'true' || inputs.comment-if-not-clean == 'true')
        }}
      shell: bash
      env:
        REQUEST_CHANGES_IF_NOT_CLEAN: ${{ inputs.request-changes-if-not-clean }}
        COMMENT_IF_NOT_CLEAN: ${{ inputs.comment-if-not-clean }}
        EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        EVENT_WORKFLOW_RUN_PULL_REQUEST_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      run: |
        echo '::group::Get PR number'
        PR_NUMBER="$EVENT_PULL_REQUEST_NUMBER"
        if [[ -z "$PR_NUMBER" ]]
        then
          PR_NUMBER="$EVENT_WORKFLOW_RUN_PULL_REQUEST_NUMBER"
        fi

        if [[ -z "$PR_NUMBER" ]]
        then
          if [[ "$REQUEST_CHANGES_IF_NOT_CLEAN" = "true" ]] || [[ "$COMMENT_IF_NOT_CLEAN" = "true" ]]
          then
            echo "::error::request-changes-if-not-clean and/or comment-if-not-clean is true, but no pull request number was found in the event payload."
          fi
        else
          echo "::notice::Pull request number is $PR_NUMBER"
        fi

        echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT
        echo '::endgroup::'

    - id: gh-pr-review
      name: gh pr review
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' && 
          inputs.request-changes-if-not-clean == 'true' &&
          steps.get-pr-number.outputs.pr-number != ''
        }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.get-tokens.outputs.request-changes-token }}
        PR_NUMBER: ${{ steps.get-pr-number.outputs.pr-number }}
        REQUEST_CHANGES_COMMENT: ${{ inputs.request-changes-comment }}
      run: |
        echo '::group::gh pr review'
        gh pr review "$PR_NUMBER" -rb "$REQUEST_CHANGES_COMMENT"
        echo '::endgroup::'

    - id: gh-pr-comment
      name: gh pr comment
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' &&
          inputs.comment-if-not-clean == 'true' &&
          steps.get-pr-number.outputs.pr-number != ''
        }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ steps.get-pr-number.outputs.pr-number }}
        COMMENT_MESSAGE: ${{ inputs.comment-message }}
      run: |
        echo '::group::gh pr comment'
        gh pr comment "$PR_NUMBER" --body "$COMMENT_MESSAGE"
        echo '::endgroup::'

    - id: config-git-with-token
      name: Config git with token
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' && 
          inputs.push-if-not-clean == 'true'
        }}
      uses: CatChen/config-git-with-token-action@v2
      with:
        github-token: ${{ steps.get-tokens.outputs.push-token }}

    - id: git-commit
      name: git commit
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' &&
          inputs.push-if-not-clean == 'true' &&
          github.event_name == 'pull_request'
        }}
      shell: bash
      env:
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        TARGETS: ${{ steps.sanitize-targets.outputs.targets }}
      run: |
        echo '::group::git commit'
        TARGET_PATHS=()
        while IFS= read -r TARGET_PATH || [[ -n "$TARGET_PATH" ]]
        do
          TARGET_PATHS+=("$TARGET_PATH")
        done < <(printf '%s' "$TARGETS")

        git add -- "${TARGET_PATHS[@]}"
        git commit -m "$COMMIT_MESSAGE"
        echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo '::endgroup::'

    - id: git-fetch
      name: git fetch
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' &&
          inputs.push-if-not-clean == 'true' &&
          github.event_name == 'pull_request'
        }}
      shell: bash
      run: |
        echo '::group::git fetch'
        IS_SHALLOW=$(git rev-parse --is-shallow-repository)
        if [[ "$IS_SHALLOW" == "true" ]]
        then
          git fetch --unshallow origin
        fi
        echo '::endgroup::'

    - id: git-push
      name: git push
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' &&
          inputs.push-if-not-clean == 'true' &&
          github.event_name == 'pull_request'
        }}
      shell: bash
      env:
        BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        EXPECTED_REMOTE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_STRATEGY_INPUT: ${{ inputs.push-strategy }}
      run: |
        echo '::group::git push'

        PUSH_STRATEGY="$PUSH_STRATEGY_INPUT"

        PUSH_ARGS=()
        case "$PUSH_STRATEGY" in
          normal)
            ;;
          force-with-lease)
            PUSH_ARGS+=(--force-with-lease="refs/heads/$BRANCH_NAME:$EXPECTED_REMOTE_HEAD_SHA")
            ;;
          force)
            PUSH_ARGS+=(--force)
            ;;
          *)
            echo "::error::Invalid push-strategy '$PUSH_STRATEGY'. Supported values: normal, force-with-lease, force."
            exit 1
            ;;
        esac

        echo "::notice::Using push strategy: $PUSH_STRATEGY"

        echo "::notice::Push to origin HEAD:refs/heads/$BRANCH_NAME"
        git push "${PUSH_ARGS[@]}" --set-upstream origin "HEAD:refs/heads/$BRANCH_NAME"
        echo '::endgroup::'

    - id: exit-1
      name: exit 1
      if: |-
        ${{
          steps.git-status.outputs.status == 'dirty' &&
          inputs.fail-if-not-clean == 'true'
        }}
      shell: bash
      run: exit 1
branding:
  icon: 'edit-3'
  color: 'red'
